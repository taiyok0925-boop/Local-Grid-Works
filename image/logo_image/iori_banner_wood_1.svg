<svg width="190" height="85" viewBox="0 0 190 85" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;800&amp;display=swap');
    </style>
    <filter id="grain-a">
      <feTurbulence type="fractalNoise" baseFrequency="0.015 0.6" numOctaves="4" seed="2" result="noise"/>
      <feColorMatrix type="saturate" values="0.3" in="noise" result="coloredNoise"/>
      <feBlend in="SourceGraphic" in2="coloredNoise" mode="multiply" result="blended"/>
      <feComponentTransfer in="blended">
        <feFuncR type="linear" slope="1.1" intercept="-0.05"/>
        <feFuncG type="linear" slope="1.05" intercept="-0.02"/>
      </feComponentTransfer>
    </filter>
    <clipPath id="clip">
      <rect width="190" height="85" rx="6"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="190" height="85" fill="#e8d5b0"/>
    <rect width="190" height="85" fill="#d4a96a" opacity="0.3" filter="url(#grain-a)"/>

    <line x1="0" y1="12" x2="190" y2="10" stroke="#c49a55" stroke-width="0.6" opacity="0.4"/>
    <line x1="0" y1="22" x2="190" y2="20" stroke="#b88a45" stroke-width="0.4" opacity="0.3"/>
    <line x1="0" y1="35" x2="190" y2="32" stroke="#c49a55" stroke-width="0.8" opacity="0.35"/>
    <line x1="0" y1="48" x2="190" y2="45" stroke="#b88a45" stroke-width="0.5" opacity="0.25"/>
    <line x1="0" y1="58" x2="190" y2="56" stroke="#c49a55" stroke-width="0.6" opacity="0.3"/>
    <line x1="0" y1="70" x2="190" y2="68" stroke="#b88a45" stroke-width="0.4" opacity="0.2"/>

    <path d="M 50 0 Q 75 20 58 42 Q 44 60 65 85" stroke="#b88a45" stroke-width="1.2" fill="none" opacity="0.25"/>
    <path d="M 68 0 Q 95 25 78 48 Q 62 68 88 85" stroke="#c49a55" stroke-width="0.8" fill="none" opacity="0.2"/>
    <path d="M 130 0 Q 148 30 135 55 Q 122 72 144 85" stroke="#b88a45" stroke-width="1" fill="none" opacity="0.2"/>

    <rect width="190" height="85" fill="#f5e8cc" opacity="0.15"/>
    <rect width="190" height="85" rx="6" fill="none" stroke="#c4a882" stroke-width="0.5"/>
    <line x1="37" y1="0" x2="37" y2="85" stroke="#a07840" stroke-width="0.5" opacity="0.4"/>

    <!-- アイコン -->
    <rect x="10" y="18" width="18" height="3" rx="1.5" fill="#7a5a38" opacity="0.7"/>
    <rect x="18" y="21" width="2"  height="14" fill="#7a5a38" opacity="0.7"/>
    <rect x="8"  y="27" width="22" height="1.5" rx="0.75" fill="#7a5a38" opacity="0.5"/>
    <rect x="10" y="62" width="18" height="3" rx="1.5" fill="#7a5a38" opacity="0.7"/>

    <!-- サブテキスト（左寄せ） -->
    <text x="49" y="28"
          font-family="'M PLUS Rounded 1c', sans-serif"
          font-size="9" font-weight="400"
          fill="#7a5a38" letter-spacing="1.2" opacity="0.9">無垢家具工房</text>

    <text x="44" y="55"
          font-family="'M PLUS Rounded 1c', sans-serif"
          font-size="19" font-weight="800"
          fill="#3d2010" letter-spacing="1.5"
          stroke="#c49a55" stroke-width="1"
          paint-order="stroke fill">イオリスペース</text>

    <text x="41" y="72"
          font-family="'M PLUS Rounded 1c', sans-serif"
          font-size="7.5" font-weight="400"
          fill="#8a6840" letter-spacing="0.6" opacity="0.85">wall shelf &amp; handmade furniture</text>
  </g>
</svg>
